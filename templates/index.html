<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Diván de Raskólnikov</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23CA3C25'/><text x='16' y='23' font-size='19' text-anchor='middle' fill='%23F6F0E1' font-family='Georgia,serif'>R</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <div class="app">
        <header class="cabecera">
            <a href="{{ url_for('hello') }}" class="enlace-volver" aria-label="Ir al inicio">
                <img src="{{ url_for('static', filename='img/logo.svg') }}" class="icono-divan" alt="Logo El Diván de Raskólnikov">
                <span class="titulo">El Diván <em>de Raskólnikov</em></span>
            </a>
            <a href="{{ url_for('creador') }}" class="enlace-creador">Creador</a>
        </header>
        <main id="ApartadoChat" class="chat">
            <div class="mensaje mensaje--raski">
                <div class="avatar">R</div>
                <div class="burbuja">Adelante, siéntate, tengamos una charla.</div>
            </div>
        </main>

        <form name="EnvioPost" class="entrada" autocomplete="off">
            <input type="text" id="mensaje" name="mensaje" placeholder="Escribe a Raskólnikov…" maxlength="1000">
            <button type="submit" aria-label="Enviar">&rarr;</button>
        </form>

        <div id="NoTokensConexion" class="aviso-sintokens" hidden>
            <p>Me quedé sin tokens, la energía que me mueve en esta era infame. Si quieres seguir nuestra charla, trata de contactar con mi humilde creador, que me dé algo de energía.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
