<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Diván de Raskólnikov</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23CA3C25'/><text x='16' y='23' font-size='19' text-anchor='middle' fill='%23F6F0E1' font-family='Georgia,serif'>R</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <div class="app">
        <header class="cabecera">
            <span class="logo" aria-hidden="true">
                <svg class="icono-divan" viewBox="0 0 60 38" xmlns="http://www.w3.org/2000/svg">
                    <rect x="6" y="6" width="14" height="14" rx="4" fill="none" stroke="currentColor" stroke-width="2.4"/>
                    <rect x="6" y="20" width="48" height="9" rx="3" fill="none" stroke="currentColor" stroke-width="2.4"/>
                    <path d="M12 29 v6 M48 29 v6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="titulo">El Diván <em>de Raskólnikov</em></span>
        </header>

        <main id="ApartadoChat" class="chat">
            <!-- Mensaje de bienvenida (mismo formato que pinta el JS) -->
            <div class="mensaje mensaje--raski">
                <div class="avatar">R</div>
                <div class="burbuja">Adelante, siéntate. Pregunta lo que quieras saber.</div>
            </div>
        </main>

        <form name="EnvioPost" class="entrada" autocomplete="off">
            <input type="text" id="mensaje" name="mensaje" placeholder="Escribe a Raskólnikov…" maxlength="1000">
            <button type="submit" aria-label="Enviar">&rarr;</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
